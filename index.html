<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlexJournal Pro</title>
    <link rel="apple-touch-icon" href="icon.png.PNG">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --text: #ffffff; --primary: #bb86fc; --secondary: #03dac6; --error: #cf6679; }
        body { font-family: -apple-system, system-ui; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 100px;}
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); z-index: 10; padding: 10px 0; }
        .tab { flex: 1; padding: 12px; text-align: center; background: var(--card); border-radius: 8px; cursor: pointer; font-size: 14px; border: 1px solid transparent; }
        .tab.active { border-color: var(--primary); font-weight: bold; color: var(--primary); }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .macro-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 10px; }
        .macro-box { text-align: center; font-size: 12px; background: #2a2a2a; padding: 8px; border-radius: 6px; }
        .progress-bar { background: #333; height: 8px; border-radius: 4px; overflow: hidden; margin: 5px 0; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        input, select { background: #333; border: 1px solid #444; color: white; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; }
        button.main-btn { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; color: black; }
        .list-item { padding: 12px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .hidden { display: none; }
        #selection-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; padding:20px; box-sizing:border-box; overflow-y:auto; display:none; }
    </style>
</head>
<body>

    <div id="selection-overlay"></div>

    <div class="tab-bar">
        <div class="tab active" onclick="showTab('workout')">Workouts</div>
        <div class="tab" onclick="showTab('nutrition')">Nutrition</div>
        <div class="tab" onclick="showTab('data')">Settings</div>
    </div>

    <div id="workout-tab" class="content-tab">
        <div id="workout-container"></div>
        <button class="main-btn" style="background: var(--secondary);" onclick="createWorkout()">+ New Workout Category</button>
    </div>

    <div id="nutrition-tab" class="content-tab hidden">
        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h2 style="margin:0">Nutrition</h2>
                <button onclick="setMacros()" style="background:none; border:1px solid var(--primary); color:var(--primary); padding:4px 8px; border-radius:4px; font-size:11px;">Set Goals</button>
            </div>
            
            <div style="margin-top:15px;">
                <div style="display:flex; justify-content:space-between"><span>Calories</span><span id="cal-text">0 / 2500</span></div>
                <div class="progress-bar"><div id="cal-fill" class="progress-fill"></div></div>
            </div>

            <div class="macro-grid">
                <div class="macro-box">P: <span id="p-text">0/150</span>g<div class="progress-bar"><div id="p-fill" class="progress-fill" style="background:var(--secondary)"></div></div></div>
                <div class="macro-box">F: <span id="f-text">0/70</span>g<div class="progress-bar"><div id="f-fill" class="progress-fill" style="background:#ffb74d"></div></div></div>
                <div class="macro-box">C: <span id="c-text">0/250</span>g<div class="progress-bar"><div id="c-fill" class="progress-fill" style="background:#4fc3f7"></div></div></div>
            </div>

            <h4 style="color:var(--primary); margin-bottom:5px; margin-top:20px;">Today's Log</h4>
            <div id="daily-log-list" style="max-height:150px; overflow-y:auto; font-size:13px;"></div>
            <button class="main-btn" onclick="addCustomFoodToLibrary()" style="background:#444; color:white; font-size:12px;">+ Create New Custom Food</button>
        </div>

        <div class="card">
            <input type="text" id="food-input" placeholder="Search Food Library...">
            <div id="food-results"></div>
        </div>

        <div class="card">
            <h3 style="margin-top:0">3-Day History</h3>
            <div id="history-container"></div>
        </div>
    </div>

    <div id="data-tab" class="content-tab hidden">
        <div class="card">
            <h2>Data Management</h2>
            <button class="main-btn" onclick="exportToFile()">Export Backup (.JSON)</button>
            <label class="main-btn" style="background:#444; color:white; display:block; text-align:center; cursor:pointer; margin-top:15px;">
                Import Backup (.JSON)
                <input type="file" style="display:none;" onchange="importFromFile(this)">
            </label>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'FlexJournal_PRO_V3';
        let db;

        const masterExercises = ["ISO Bench Press", "ISO Lateral Incline", "ISO Shoulder Press", "ISO Lateral Row", "Hip Abduction", "OL RDL", "Cable Oblique", "Seated Facepull", "Rear Delt Fly", "Dips", "OL Leg Press", "Wood chopper", "Hanging Leg Raise", "Back Extension", "Bulgarian Split Squat", "Hip Adduction", "Hip Thrusts", "Kettlebell Obliques", "Cable Lateral Raise"];

        function init() {
            const today = new Date().toISOString().split('T')[0];
            const saved = localStorage.getItem(STORAGE_KEY);
            const defaults = {
                routines: [], library: masterExercises, customFoods: [],
                nutrition: { consumed: { cal: 0, p: 0, f: 0, c: 0 }, goals: { cal: 2500, p: 150, f: 70, c: 250 }, lastUpdate: today, dailyLog: [], history: [] }
            };

            db = saved ? JSON.parse(saved) : defaults;
            
            // Logic to handle daily reset
            if (db.nutrition.lastUpdate !== today) {
                if(db.nutrition.consumed.cal > 0) {
                    db.nutrition.history.unshift({date: db.nutrition.lastUpdate, ...db.nutrition.consumed});
                    db.nutrition.history = db.nutrition.history.slice(0, 3);
                }
                db.nutrition.consumed = { cal: 0, p: 0, f: 0, c: 0 };
                db.nutrition.dailyLog = [];
                db.nutrition.lastUpdate = today;
            }
            save();
        }

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); updateUI(); }

        // --- NUTRITION FUNCTIONS ---
        function setMacros() {
            db.nutrition.goals.cal = parseInt(prompt("Daily Calorie Goal:", db.nutrition.goals.cal)) || 2500;
            db.nutrition.goals.p = parseInt(prompt("Protein Goal (g):", db.nutrition.goals.p)) || 150;
            db.nutrition.goals.f = parseInt(prompt("Fats Goal (g):", db.nutrition.goals.f)) || 70;
            db.nutrition.goals.c = parseInt(prompt("Carbs Goal (g):", db.nutrition.goals.c)) || 250;
            save();
        }

        function addCustomFoodToLibrary() {
            const name = prompt("Food Name (e.g., Protein Bar):");
            if(!name) return;
            const unit = prompt("Serving Unit (e.g., 1 bar, 1 cup, 100g):", "1 portion");
            const cal = parseInt(prompt("Calories per " + unit + ":")) || 0;
            const p = parseInt(prompt("Protein (g):")) || 0;
            const f = parseInt(prompt("Fats (g):")) || 0;
            const c = parseInt(prompt("Carbs (g):")) || 0;
            
            db.customFoods.push({ name, unit, cal, p, f, c });
            save();
            alert(name + " added to library!");
        }

        function logFood(food, multiplier) {
            const entry = {
                id: Date.now(),
                name: food.name,
                cal: Math.round(food.cal * multiplier),
                p: Math.round(food.p * multiplier),
                f: Math.round(food.f * multiplier),
                c: Math.round(food.c * multiplier)
            };
            db.nutrition.consumed.cal += entry.cal;
            db.nutrition.consumed.p += entry.p;
            db.nutrition.consumed.f += entry.f;
            db.nutrition.consumed.c += entry.c;
            db.nutrition.dailyLog.push(entry);
            save();
        }

        function removeFood(id) {
            const entry = db.nutrition.dailyLog.find(e => e.id === id);
            if(entry) {
                db.nutrition.consumed.cal -= entry.cal;
                db.nutrition.consumed.p -= entry.p;
                db.nutrition.consumed.f -= entry.f;
                db.nutrition.consumed.c -= entry.c;
                db.nutrition.dailyLog = db.nutrition.dailyLog.filter(e => e.id !== id);
                save();
            }
        }

        function updateUI() {
            // Update Progress Bars
            const n = db.nutrition;
            const updateBar = (id, cur, goal) => {
                const fill = document.getElementById(id + '-fill');
                const text = document.getElementById(id + '-text');
                if(fill) fill.style.width = Math.min((cur/goal)*100, 100) + '%';
                if(text) text.innerText = `${cur} / ${goal}`;
            };
            updateBar('cal', n.consumed.cal, n.goals.cal);
            updateBar('p', n.consumed.p, n.goals.p);
            updateBar('f', n.consumed.f, n.goals.f);
            updateBar('c', n.consumed.c, n.goals.c);

            // Update Logs
            document.getElementById('daily-log-list').innerHTML = n.dailyLog.map(e => `
                <div class="list-item" style="padding:8px 0;">
                    <span>${e.name} <small style="color:#888">(${e.cal}cal, ${e.p}p)</small></span>
                    <span onclick="removeFood(${e.id})" style="color:var(--error); font-weight:bold; cursor:pointer;">✕</span>
                </div>
            `).join('') || '<p style="color:#666">No food logged yet.</p>';

            // Update History
            document.getElementById('history-container').innerHTML = n.history.map(h => `
                <div style="font-size:12px; border-bottom:1px solid #333; padding:5px 0;">
                    <strong>${h.date}</strong>: ${h.cal}cal | P:${h.p} F:${h.f} C:${h.c}
                </div>
            `).join('');

            renderWorkouts();
        }

        // --- SEARCH LOGIC ---
        document.getElementById('food-input').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            if(!q) { document.getElementById('food-results').innerHTML = ''; return; }
            const combined = [...db.customFoods, {name:"Chicken Breast", unit:"100g", cal:165, p:31, f:3, c:0}, {name:"White Rice", unit:"100g cooked", cal:130, p:3, f:0, c:28}];
            const res = combined.filter(f => f.name.toLowerCase().includes(q));
            
            document.getElementById('food-results').innerHTML = res.map(f => `
                <div class="list-item" onclick="const qty=parseFloat(prompt('How many ${f.unit}?','1')); if(qty) logFood(${JSON.stringify(f).replace(/"/g, '&quot;')}, qty)">
                    <span>${f.name} <br><small style="color:#666">${f.cal}cal per ${f.unit}</small></span>
                    <span style="color:var(--secondary)">+ Add</span>
                </div>
            `).join('');
        });

        // --- WORKOUT HELPERS ---
        function createWorkout() {
            const n = prompt("Workout Name:");
            if(n) { db.routines.push({ id: Date.now(), name: n, collapsed: false, exercises: [] }); save(); }
        }

        function renderWorkouts() {
            const container = document.getElementById('workout-container');
            container.innerHTML = db.routines.map(r => `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <h2 style="margin:0">${r.name}</h2>
                        <span onclick="if(confirm('Delete?')){db.routines=db.routines.filter(x=>x.id!==${r.id});save()}" style="color:var(--error); opacity:0.5;">✕</span>
                    </div>
                    ${r.exercises.map((ex, i) => `
                        <div style="margin-top:10px; border-top:1px solid #333; padding-top:10px;">
                            <div style="display:flex; justify-content:space-between"><strong>${ex.name}</strong> <span onclick="db.routines.find(x=>x.id==${r.id}).exercises.splice(${i},1);save()" style="opacity:0.3">✕</span></div>
                            <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:5px; margin-top:5px;">
                                <input type="text" placeholder="wt" value="${ex.weight || ''}" onchange="db.routines.find(x=>x.id==${r.id}).exercises[${i}].weight=this.value;save()">
                                <input type="number" placeholder="reps" value="${ex.reps || ''}" onchange="db.routines.find(x=>x.id==${r.id}).exercises[${i}].reps=this.value;save()">
                                <button onclick="db.routines.find(x=>x.id==${r.id}).exercises[${i}].done=!db.routines.find(x=>x.id==${r.id}).exercises[${i}].done;save()" style="background:${ex.done?'var(--secondary)':'#444'}; border:none; border-radius:6px;">${ex.done?'✔':'Set'}</button>
                            </div>
                        </div>
                    `).join('')}
                    <button class="main-btn" style="background:transparent; border:1px dashed var(--secondary); color:var(--secondary); font-size:12px;" onclick="openExMenu(${r.id})">+ Add Exercise</button>
                </div>
            `).join('');
        }

        function openExMenu(rId) {
            const overlay = document.getElementById('selection-overlay');
            overlay.style.display = 'block';
            let html = `<h2 style="color:var(--primary)">Select Exercise</h2>`;
            db.library.sort().forEach(ex => {
                html += `<div class="list-item" onclick="db.routines.find(r=>r.id==${rId}).exercises.push({name:'${ex}', done:false}); document.getElementById('selection-overlay').style.display='none'; save();"><span>${ex}</span><span>+</span></div>`;
            });
            html += `<button class="main-btn" onclick="document.getElementById('selection-overlay').style.display='none'">Cancel</button>`;
            overlay.innerHTML = html;
        }

        function showTab(t) {
            document.querySelectorAll('.content-tab').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(t + '-tab').classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function exportToFile() {
            const blob = new Blob([JSON.stringify(db)], { type: "application/json" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "FlexJournal_Backup.json";
            link.click();
        }

        function importFromFile(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                db = JSON.parse(e.target.result);
                save();
                location.reload();
            };
            reader.readAsText(input.files[0]);
        }

        init();
    </script>
</body>
</html>
