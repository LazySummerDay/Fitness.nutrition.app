<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlexJournal Pro</title>
    
    <link rel="apple-touch-icon" href="icon.png.PNG">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #ffffff;
            --primary: #bb86fc; --secondary: #03dac6; --error: #cf6679;
        }
        body { font-family: -apple-system, system-ui; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 100px;}
        
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); z-index: 10; padding: 10px 0; }
        .tab { flex: 1; padding: 12px; text-align: center; background: var(--card); border-radius: 8px; cursor: pointer; font-size: 14px; border: 1px solid transparent; }
        .tab.active { border-color: var(--primary); font-weight: bold; color: var(--primary); }
        
        #timer-display { display:none; position:fixed; top:0; left:0; width:100%; background:var(--secondary); color:black; text-align:center; padding:12px; font-weight:bold; z-index:1000; }
        .timer-btns { display: flex; justify-content: center; gap: 10px; margin-top: 5px; }
        .t-btn { background: rgba(0,0,0,0.2); border: 1px solid black; padding: 5px 10px; border-radius: 4px; font-size: 12px; }

        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .workout-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .collapsed .workout-content { display: none; }
        
        .exercise-row { margin-bottom: 18px; border-bottom: 1px solid #2a2a2a; padding-bottom: 12px; }
        .ex-meta { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .ex-controls { display: grid; grid-template-columns: 1fr 0.8fr 0.6fr 1.2fr; gap: 6px; align-items: center; }
        
        input, select { background: #333; border: 1px solid #444; color: white; padding: 8px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 13px;}
        .set-btn { background: var(--secondary); border: none; padding: 8px; border-radius: 6px; color: #000; font-weight: bold; width: 100%; height: 35px;}

        .progress-bar { background: #333; height: 10px; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        
        button.main-btn { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; color: black; }
        .hidden { display: none; }
        
        /* Selection Overlay */
        #selection-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; padding:20px; box-sizing:border-box; overflow-y:auto; display:none; }
        .list-item { padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; font-size: 16px; }
    </style>
</head>
<body>

    <div id="timer-display">
        REST: <span id="seconds">60</span>s
        <div class="timer-btns">
            <div class="t-btn" onclick="adjustTimer(30)">+30s</div>
            <div class="t-btn" onclick="endTimer()">End Rest</div>
        </div>
    </div>

    <div id="selection-overlay"></div>

    <div class="tab-bar">
        <div class="tab active" onclick="showTab('workout')">Workouts</div>
        <div class="tab" onclick="showTab('nutrition')">Nutrition</div>
        <div class="tab" onclick="showTab('data')">Settings</div>
    </div>

    <div id="workout-tab" class="content-tab">
        <div id="workout-container"></div>
        <button class="main-btn" style="background: var(--secondary);" onclick="createWorkout()">+ New Workout Category</button>
    </div>

    <div id="nutrition-tab" class="content-tab hidden">
        <div class="card">
            <h2>Daily Macros</h2>
            <div style="display:flex; justify-content:space-between"><span>Calories</span><span id="cal-text">0 / 2500</span></div>
            <div class="progress-bar"><div id="cal-fill" class="progress-fill"></div></div>
            <div style="display:flex; justify-content:space-between"><span>Protein</span><span id="pro-text">0g / 150g</span></div>
            <div class="progress-bar"><div id="pro-fill" class="progress-fill" style="background:var(--secondary)"></div></div>
            <button class="main-btn" onclick="addCustomFood()" style="background:#444; color:white; font-size:12px;">+ Add Custom Food Item</button>
        </div>
        <div class="card">
            <input type="text" id="food-input" placeholder="Search (Brown Rice, Beef, Milk)...">
            <div id="food-results" style="margin-top:10px;"></div>
        </div>
    </div>

    <div id="data-tab" class="content-tab hidden">
        <div class="card">
            <h2>Settings</h2>
            <label style="font-size:12px; color:#888;">Rest Time (Sec)</label>
            <input type="number" id="rest-setting" onchange="db.settings.rest=parseInt(this.value);save()">
            <button class="main-btn" style="margin-top:20px;" onclick="exportToFile()">Export Backup (.JSON)</button>
            <button class="main-btn" style="background:var(--error); margin-top: 40px; font-size:10px;" onclick="if(confirm('Wipe all data?')){localStorage.clear();location.reload();}">Hard Reset App</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'FlexJournal_v10';
        let timerInterval;
        let timeLeft = 0;

        let db = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            routines: [],
            library: ["Bench Press", "Squat", "Deadlift", "Overhead Press", "Pull Ups", "Bicep Curls"],
            customFoods: [],
            settings: { rest: 60 },
            nutrition: { consumed: { cal: 0, pro: 0 }, goals: { cal: 2500, pro: 150 } }
        };

        const baseFoodDB = [
            { name: "White Rice", cal: 130, pro: 2.7, unit: "100g cooked" },
            { name: "Brown Rice", cal: 111, pro: 2.6, unit: "100g cooked" },
            { name: "Ground Beef (80/20)", cal: 250, pro: 26, unit: "100g" },
            { name: "Ground Beef (93/7)", cal: 170, pro: 26, unit: "100g" },
            { name: "Milk (1%)", cal: 42, pro: 3.4, unit: "100ml" },
            { name: "Milk (2%)", cal: 50, pro: 3.3, unit: "100ml" },
            { name: "Chicken Breast", cal: 165, pro: 31, unit: "100g" },
            { name: "Oats (Dry)", cal: 150, pro: 5, unit: "40g" },
            { name: "Black Beans", cal: 132, pro: 8.9, unit: "100g" },
            { name: "Lentils", cal: 116, pro: 9, unit: "100g" },
            { name: "Chickpeas", cal: 164, pro: 8.9, unit: "100g" },
            { name: "Corn", cal: 86, pro: 3.2, unit: "100g" },
            { name: "Cereal", cal: 380, pro: 8, unit: "100g" },
            { name: "Romanian Lettuce", cal: 17, pro: 1.2, unit: "100g" },
            { name: "Broccoli", cal: 34, pro: 2.8, unit: "100g" },
            { name: "Pasta (Noodles)", cal: 131, pro: 5, unit: "100g cooked" },
            { name: "Quinoa", cal: 120, pro: 4.4, unit: "100g cooked" },
            { name: "Cheddar Cheese", cal: 400, pro: 25, unit: "100g" },
            { name: "Cucumber", cal: 15, pro: 0.7, unit: "100g" },
            { name: "Cherry Tomatoes", cal: 18, pro: 0.9, unit: "100g" },
            { name: "Protein Powder", cal: 120, pro: 30, unit: "1 scoop (30g)" }
        ];

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); updateUI(); }

        function createWorkout() {
            const n = prompt("Workout Name:");
            if(n) { db.routines.push({ id: Date.now(), name: n, date: new Date().toISOString().split('T')[0], collapsed: false, exercises: [] }); save(); }
        }

        function toggleCollapse(id) {
            const r = db.routines.find(x => x.id === id);
            r.collapsed = !r.collapsed;
            save();
        }

        // --- EXERCISE SELECTION MENU ---
        function openExerciseMenu(rId) {
            const overlay = document.getElementById('selection-overlay');
            overlay.style.display = 'block';
            let html = `<h2 style="color:var(--primary); margin-top:0;">Select Exercise</h2>`;
            html += `<button class="main-btn" onclick="createNewEx(${rId})">+ Create New Exercise</button><br><br>`;
            
            db.library.sort().forEach(ex => {
                html += `<div class="list-item" onclick="addExToRoutine(${rId},'${ex}')"><span>${ex}</span><span style="color:var(--secondary)">+</span></div>`;
            });
            html += `<button class="main-btn" style="background:#444; color:white;" onclick="document.getElementById('selection-overlay').style.display='none'">Close</button>`;
            overlay.innerHTML = html;
        }

        function addExToRoutine(rId, name) {
            db.routines.find(r => r.id === rId).exercises.push({ name: name, weight: "", units: "lb", reps: "", setsDone: 0, targetSets: 3, notes: "" });
            document.getElementById('selection-overlay').style.display = 'none';
            save();
        }

        function createNewEx(rId) {
            const n = prompt("New Exercise Name:");
            if(n) {
                if(!db.library.includes(n)) db.library.push(n);
                addExToRoutine(rId, n);
            }
        }

        // --- SETS & TIMER ---
        function updateSets(rId, i) {
            const ex = db.routines.find(r => r.id === rId).exercises[i];
            ex.setsDone++;
            if(ex.setsDone > ex.targetSets) {
                ex.setsDone = 0; // 4th click resets to 0
                endTimer();
            } else {
                startTimer();
            }
            save();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = db.settings.rest || 60;
            const el = document.getElementById('timer-display');
            el.style.display = 'block';
            el.style.background = 'var(--secondary)';
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('seconds').innerText = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    if (navigator.vibrate) navigator.vibrate([300, 100, 300]);
                    el.style.background = 'var(--error)';
                }
            }, 1000);
        }

        function adjustTimer(amt) { timeLeft += amt; document.getElementById('seconds').innerText = timeLeft; }
        function endTimer() { clearInterval(timerInterval); document.getElementById('timer-display').style.display = 'none'; }

        // --- NUTRITION ---
        function addCustomFood() {
            const n = prompt("Food Name:");
            const c = parseInt(prompt("Calories:"));
            const p = parseInt(prompt("Protein (g):"));
            if(n && !isNaN(c)) {
                db.customFoods.push({ name: n, cal: c, pro: p || 0, unit: "custom" });
                save();
            }
        }

        function updateUI() {
            document.getElementById('rest-setting').value = db.settings.rest || 60;
            const cont = document.getElementById('workout-container');
            cont.innerHTML = db.routines.map(r => `
                <div class="card ${r.collapsed ? 'collapsed' : ''}">
                    <div class="workout-header">
                        <div onclick="toggleCollapse(${r.id})" style="flex:1">
                            <span style="font-size:18px">${r.collapsed ? '▶' : '▼'}</span>
                            <h2 style="display:inline; margin-left:10px;">${r.name}</h2>
                        </div>
                        <input type="date" style="background:transparent; border:none; color:#888; width:115px;" value="${r.date}" onchange="db.routines.find(x=>x.id==${r.id}).date=this.value;save()">
                    </div>
                    <div class="workout-content">
                        ${r.exercises.map((ex, i) => `
                            <div class="exercise-row">
                                <div class="ex-meta"><strong>${ex.name}</strong> <span onclick="if(confirm('Delete?')){db.routines.find(x=>x.id==${r.id}).exercises.splice(${i},1);save()}" style="opacity:0.3">✕</span></div>
                                <div class="ex-controls">
                                    <input type="text" placeholder="wt" value="${ex.weight}" onchange="db.routines.find(x=>x.id==${r.id}).exercises[${i}].weight=this.value;save()">
                                    <select onchange="db.routines.find(x=>x.id==${r.id}).exercises[${i}].units=this.value;save()">
                                        <option ${ex.units==='lb'?'selected':''}>lb</option>
                                        <option ${ex.units==='kg'?'selected':''}>kg</option>
                                    </select>
                                    <input type="number" placeholder="reps" value="${ex.reps}" onchange="db.routines.find(x=>x.id==${r.id}).exercises[${i}].reps=this.value;save()">
                                    <button class="set-btn" onclick="updateSets(${r.id}, ${i})">${ex.setsDone}/${ex.targetSets}</button>
                                </div>
                            </div>
                        `).join('')}
                        <button class="main-btn" style="background:transparent; border:1px dashed var(--secondary); color:var(--secondary);" onclick="openExerciseMenu(${r.id})">+ Add Exercise</button>
                    </div>
                </div>
            `).join('');
            
            const n = db.nutrition;
            document.getElementById('cal-fill').style.width = Math.min((n.consumed.cal/n.goals.cal)*100, 100) + '%';
            document.getElementById('pro-fill').style.width = Math.min((n.consumed.pro/n.goals.pro)*100, 100) + '%';
            document.getElementById('cal-text').innerText = `${n.consumed.cal} / ${n.goals.cal}`;
            document.getElementById('pro-text').innerText = `${n.consumed.pro}g / ${n.goals.pro}g`;
        }

        document.getElementById('food-input').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            if(!q) { document.getElementById('food-results').innerHTML = ''; return; }
            const combined = [...baseFoodDB, ...db.customFoods];
            const res = combined.filter(f => f.name.toLowerCase().includes(q));
            document.getElementById('food-results').innerHTML = res.map(f => `
                <div class="list-item" onclick="const r=parseFloat(prompt('How many ${f.unit}?','1')); if(r){db.nutrition.consumed.cal+=Math.round(${f.cal}*r); db.nutrition.consumed.pro+=Math.round(${f.pro}*r); save();}">
                    <span>${f.name} <br><small style="color:#666">${f.cal}cal | ${f.pro}g pro</small></span>
                    <span style="color:var(--secondary)">+ Add</span>
                </div>`).join('');
        });

        function showTab(t) {
            document.querySelectorAll('.content-tab').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(t + '-tab').classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function exportToFile() {
            const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `FlexJournal_Backup.json`;
            link.click();
        }

        updateUI();
    </script>
</body>
</html>
