<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlexJournal</title>
    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #ffffff;
            --primary: #bb86fc; --secondary: #03dac6; --error: #cf6679;
        }
        body { font-family: -apple-system, system-ui; background: var(--bg); color: var(--text); margin: 0; padding: 15px; }
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); z-index: 10; padding: 10px 0; }
        .tab { flex: 1; padding: 10px; text-align: center; background: var(--card); border-radius: 8px; cursor: pointer; }
        .tab.active { border-bottom: 3px solid var(--primary); font-weight: bold; }
        
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        h2 { margin-top: 0; color: var(--primary); }
        
        /* Workout UI */
        .exercise-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr; gap: 5px; margin-bottom: 10px; align-items: center; }
        input { background: #333; border: none; color: white; padding: 8px; border-radius: 4px; width: 100%; box-sizing: border-box;}
        .set-btn { background: var(--secondary); border: none; padding: 10px; border-radius: 4px; color: #000; font-weight: bold; }
        .set-btn.undo { background: var(--error); }

        /* Nutrition UI */
        .progress-container { margin: 15px 0; }
        .progress-label { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; }
        .progress-bar { background: #333; height: 12px; border-radius: 6px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        .food-search { margin-bottom: 10px; }
        .suggestion-box { font-style: italic; color: #aaa; font-size: 13px; margin-top: 10px; }

        .hidden { display: none; }
        button.main-btn { width: 100%; padding: 12px; background: var(--primary); border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="tab-bar">
        <div class="tab active" onclick="showTab('workout')">Workouts</div>
        <div class="tab" onclick="showTab('nutrition')">Nutrition</div>
        <div class="tab" onclick="showTab('data')">Data</div>
    </div>

    <div id="workout-tab" class="content-tab">
        <div id="routine-list">
            <div class="card">
                <h2>Workout A</h2>
                <div id="workout-a-exercises"></div>
                <button class="main-btn" onclick="addExercise('workout-a')">+ Add Exercise</button>
            </div>
            <div class="card">
                <h2>Workout B</h2>
                <div id="workout-b-exercises"></div>
                <button class="main-btn" onclick="addExercise('workout-b')">+ Add Exercise</button>
            </div>
        </div>
    </div>

    <div id="nutrition-tab" class="content-tab hidden">
        <div class="card">
            <h2>Daily Macros</h2>
            <div class="progress-container">
                <div class="progress-label"><span>Calories</span><span id="cal-text">0 / 2500</span></div>
                <div class="progress-bar"><div id="cal-fill" class="progress-fill"></div></div>
            </div>
            <div class="progress-container">
                <div class="progress-label"><span>Protein</span><span id="pro-text">0g / 150g</span></div>
                <div class="progress-bar"><div id="pro-fill" class="progress-fill" style="background:var(--secondary)"></div></div>
            </div>
            <p id="ai-suggestion" class="suggestion-box">Eat something to start your day!</p>
        </div>

        <div class="card">
            <h2>Add Food</h2>
            <input type="text" id="food-input" class="food-search" placeholder="Search (e.g. Chicken, Rice)...">
            <div id="food-results"></div>
        </div>
    </div>

    <div id="data-tab" class="content-tab hidden">
        <div class="card">
            <h2>Backup & Recovery</h2>
            <button class="main-btn" onclick="exportData()">Export Data (JSON)</button>
            <button class="main-btn" style="background:#444; margin-top:10px;" onclick="importData()">Import Data</button>
        </div>
    </div>

    <script>
        // DATA INITIALIZATION
        let db = JSON.parse(localStorage.getItem('gymData')) || {
            workouts: { 'workout-a': [], 'workout-b': [] },
            nutrition: { consumed: { cal: 0, pro: 0, carb: 0, fat: 0 }, goals: { cal: 2500, pro: 150 } }
        };

        const foodDB = [
            { name: "Chicken Breast", cal: 165, pro: 31, unit: "100g" },
            { name: "White Rice", cal: 130, pro: 2.7, unit: "100g" },
            { name: "Egg", cal: 70, pro: 6, unit: "1 large" },
            { name: "Almonds", cal: 160, pro: 6, unit: "handful" }
        ];

        function save() { localStorage.setItem('gymData', JSON.stringify(db)); updateUI(); }

        // NAVIGATION
        function showTab(tab) {
            document.querySelectorAll('.content-tab').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(tab + '-tab').classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        // WORKOUT LOGIC
        function addExercise(routine) {
            const name = prompt("Exercise name:");
            if (name) {
                db.workouts[routine].push({ name, weight: 0, reps: 0, setsDone: 0, targetSets: 3 });
                save();
            }
        }

        function updateSets(routine, index, change) {
            db.workouts[routine][index].setsDone += change;
            if (db.workouts[routine][index].setsDone < 0) db.workouts[routine][index].setsDone = 0;
            save();
        }

        // NUTRITION LOGIC
        function addFood(index) {
            const food = foodDB[index];
            const ratio = parseFloat(prompt(`How many servings (${food.unit})?`, "1")) || 0;
            db.nutrition.consumed.cal += Math.round(food.cal * ratio);
            db.nutrition.consumed.pro += Math.round(food.pro * ratio);
            save();
        }

        // BACKUP LOGIC
        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(db));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", "fitness_backup.json");
            dlAnchorElem.click();
        }

        function importData() {
            const json = prompt("Paste your JSON backup string here:");
            if (json) { db = JSON.parse(json); save(); location.reload(); }
        }

        // UI RENDERING
        function updateUI() {
            // Render Workouts
            ['workout-a', 'workout-b'].forEach(r => {
                const container = document.getElementById(r + '-exercises');
                container.innerHTML = db.workouts[r].map((ex, i) => `
                    <div class="exercise-row">
                        <strong>${ex.name}</strong>
                        <input type="number" value="${ex.weight}" onchange="db.workouts['${r}'][${i}].weight=this.value;save()" placeholder="kg">
                        <input type="number" value="${ex.reps}" onchange="db.workouts['${r}'][${i}].reps=this.value;save()" placeholder="reps">
                        <button class="set-btn" onclick="updateSets('${r}', ${i}, 1)">${ex.setsDone}/${ex.targetSets}</button>
                    </div>
                `).join('');
            });

            // Render Nutrition
            const n = db.nutrition;
            const calPct = (n.consumed.cal / n.goals.cal) * 100;
            const proPct = (n.consumed.pro / n.goals.pro) * 100;
            
            document.getElementById('cal-fill').style.width = Math.min(calPct, 100) + '%';
            document.getElementById('pro-fill').style.width = Math.min(proPct, 100) + '%';
            document.getElementById('cal-text').innerText = `${n.consumed.cal} / ${n.goals.cal}`;
            document.getElementById('pro-text').innerText = `${n.consumed.pro}g / ${n.goals.pro}g`;

            // Simple "AI" Suggestion
            const calRem = n.goals.cal - n.consumed.cal;
            const proRem = n.goals.pro - n.consumed.pro;
            if (calRem > 0 && proRem > 10) {
                document.getElementById('ai-suggestion').innerText = `You have ${calRem}kcal left. Try some chicken or almonds to hit that ${proRem}g protein goal!`;
            } else {
                document.getElementById('ai-suggestion').innerText = "Looking good! Goals nearly met.";
            }
        }

        // Initialize Food Search
        document.getElementById('food-input').addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const results = foodDB.filter(f => f.name.toLowerCase().includes(query));
            document.getElementById('food-results').innerHTML = query ? results.map((f, i) => `
                <div style="padding:10px; border-bottom:1px solid #333;" onclick="addFood(${foodDB.indexOf(f)})">
                    ${f.name} - ${f.cal}cal (${f.unit})
                </div>
            `).join('') : '';
        });

        updateUI();
    </script>
</body>
</html>
