<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlexJournal Pro</title>
    
    <link rel="apple-touch-icon" href="icon.png.PNG">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #ffffff;
            --primary: #bb86fc; --secondary: #03dac6; --error: #cf6679;
        }
        body { font-family: -apple-system, system-ui; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 80px;}
        
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); z-index: 10; padding: 10px 0; }
        .tab { flex: 1; padding: 10px; text-align: center; background: var(--card); border-radius: 8px; cursor: pointer; border: 1px solid transparent; font-size: 14px; }
        .tab.active { border-color: var(--primary); font-weight: bold; color: var(--primary); }
        
        #timer-display { display:none; position:fixed; top:0; left:0; width:100%; background:var(--secondary); color:black; text-align:center; padding:8px; font-weight:bold; z-index:1000; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .workout-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        h2 { margin: 0; color: var(--primary); font-size: 1.2rem; }
        
        .exercise-row { margin-bottom: 18px; border-bottom: 1px solid #2a2a2a; padding-bottom: 12px; }
        .ex-meta { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .ex-controls { display: grid; grid-template-columns: 1.2fr 0.8fr 0.8fr 1fr; gap: 6px; align-items: center; }
        
        input, select { background: #333; border: 1px solid #444; color: white; padding: 8px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 13px;}
        .set-btn { flex: 2; background: var(--secondary); border: none; padding: 8px; border-radius: 6px; color: #000; font-weight: bold; font-size: 11px;}
        .undo-btn { flex: 1; background: #444; border: none; padding: 8px; border-radius: 6px; color: white; font-size: 11px; }

        .notes-row { margin-top: 8px; }
        .notes-box { font-size: 12px; color: #aaa; background: rgba(51, 51, 51, 0.4); border: 1px solid #333; height: 30px; }

        .progress-container { margin: 15px 0; }
        .progress-label { display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px; }
        .progress-bar { background: #333; height: 10px; border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        
        button.main-btn { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; color: black; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="timer-display">REST: <span id="seconds">60</span>s</div>

    <div class="tab-bar">
        <div class="tab active" onclick="showTab('workout')">Workouts</div>
        <div class="tab" onclick="showTab('nutrition')">Nutrition</div>
        <div class="tab" onclick="showTab('data')">Settings</div>
    </div>

    <div id="workout-tab" class="content-tab">
        <div id="workout-container"></div>
        <button class="main-btn" style="background: var(--secondary);" onclick="createWorkout()">+ New Workout Type</button>
    </div>

    <div id="nutrition-tab" class="content-tab hidden">
        <div class="card">
            <h2>Daily Macros</h2>
            <div class="progress-container">
                <div class="progress-label"><span>Calories</span><span id="cal-text">0 / 2500</span></div>
                <div class="progress-bar"><div id="cal-fill" class="progress-fill"></div></div>
            </div>
            <div class="progress-container">
                <div class="progress-label"><span>Protein</span><span id="pro-text">0g / 150g</span></div>
                <div class="progress-bar"><div id="pro-fill" class="progress-fill" style="background:var(--secondary)"></div></div>
            </div>
            <button class="main-btn" style="background:#444; font-size:12px; height:30px; padding:0;" onclick="resetDailyNutrition()">Reset Daily Totals</button>
        </div>
        <div class="card">
            <h2>Add Food</h2>
            <input type="text" id="food-input" placeholder="Search (Chicken, Rice, Egg)...">
            <div id="food-results" style="margin-top:10px;"></div>
        </div>
    </div>

    <div id="data-tab" class="content-tab hidden">
        <div class="card">
            <h2>Data Management</h2>
            <button class="main-btn" onclick="exportData()">Export Backup Text</button>
            <button class="main-btn" style="background:#444;" onclick="importData()">Import Backup Text</button>
            <button class="main-btn" style="background:var(--error); margin-top: 40px; font-size:10px;" onclick="if(confirm('Wipe everything?')){localStorage.clear();location.reload();}">Hard Reset App</button>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('gymDataPlain')) || {
            routines: [],
            nutrition: { consumed: { cal: 0, pro: 0 }, goals: { cal: 2500, pro: 150 } }
        };

        const foodDB = [
            { name: "Chicken Breast", cal: 165, pro: 31, unit: "100g" }, { name: "White Rice", cal: 130, pro: 2.7, unit: "100g" },
            { name: "Egg", cal: 70, pro: 6, unit: "1 large" }, { name: "Protein Shake", cal: 120, pro: 24, unit: "1 scoop" },
            { name: "Greek Yogurt", cal: 59, pro: 10, unit: "100g" }, { name: "Steak", cal: 250, pro: 26, unit: "100g" }
        ];

        let timerInterval;
        function save() { 
            localStorage.setItem('gymDataPlain', JSON.stringify(db)); 
            updateUI(); 
        }

        function showTab(t) {
            document.querySelectorAll('.content-tab').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(t + '-tab').classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function createWorkout() {
            const n = prompt("Workout Name:");
            if(n) { db.routines.push({ id: Date.now(), name: n, exercises: [] }); save(); }
        }

        function addExercise(rId) {
            const n = prompt("Exercise Name:");
            if(!n) return;
            const type = confirm("OK for Weights, Cancel for Cardio") ? 'weights' : 'cardio';
            db.routines.find(r => r.id === rId).exercises.push({ name: n, type, weight: "", units: "lb", reps: "", setsDone: 0, targetSets: 3, notes: "" });
            save();
        }

        function updateSets(rId, i, c) {
            const ex = db.routines.find(r => r.id === rId).exercises[i];
            ex.setsDone = Math.max(0, ex.setsDone + c);
            if (c > 0 && ex.type === 'weights') startTimer(60);
            save();
        }

        function startTimer(d) {
            clearInterval(timerInterval);
            let t = d;
            const el = document.getElementById('timer-display');
            el.style.display = 'block';
            timerInterval = setInterval(() => {
                t--;
                document.getElementById('seconds').innerText = t;
                if (t <= 0) { 
                    clearInterval(timerInterval); 
                    el.style.display = 'none';
                }
            }, 1000);
        }

        function exportData() {
            const s = JSON.stringify(db);
            const t = document.createElement('textarea');
            t.value = s; document.body.appendChild(t); t.select();
            document.execCommand('copy'); document.body.removeChild(t);
            alert("Data copied! Paste it into your Notes.");
        }

        function importData() {
            const r = prompt("Paste backup text:");
            if(r) { db = JSON.parse(r); save(); location.reload(); }
        }

        function updateUI() {
            const cont = document.getElementById('workout-container');
            cont.innerHTML = db.routines.map(r => `
                <div class="card">
                    <div class="workout-header"><h2>${r.name}</h2> <span onclick="if(confirm('Delete?')){db.routines=db.routines.filter(x=>x.id!=${r.id});save()}" style="font-size:10px;opacity:0.4">Delete</span></div>
                    ${r.exercises.map((ex, i) => `
                        <div class="exercise-row">
                            <div class="ex-meta">
                                <span style="color:var(--primary); font-weight:bold;">${ex.name}</span>
                                <span onclick="if(confirm('Remove?')){db.routines.find(x=>x.id==${r.id}).exercises.splice(${i},1);save()}" style="color:var(--error); font-size:12px;">✕</span>
                            </div>
                            <div class="ex-controls">
                                <input type="text" placeholder="weight" value="${ex.weight}" onchange="db.routines.find(x=>x.id==${r.id}).exercises[${i}].weight=this.value;save()">
                                <select onchange="db.routines.find(x=>x.id==${r.id}).exercises[${i}].units=this.value;save()">
                                    <option ${ex.units==='lb'?'selected':''}>lb</option>
                                    <option ${ex.units==='kg'?'selected':''}>kg</option>
                                    <option ${ex.units==='minutes'?'selected':''}>min</option>
                                </select>
                                <input type="number" placeholder="reps" value="${ex.reps}" onchange="db.routines.find(x=>x.id==${r.id}).exercises[${i}].reps=this.value;save()">
                                <div class="set-controls">
                                    <button class="set-btn" onclick="updateSets(${r.id},${i},1)">${ex.setsDone}/${ex.targetSets}</button>
                                </div>
                            </div>
                            <div class="notes-row"><input type="text" class="notes-box" placeholder="Notes" value="${ex.notes||''}" onchange="db.routines.find(x=>x.id==${r.id}).exercises[${i}].notes=this.value;save()"></div>
                        </div>
                    `).join('')}
                    <button class="main-btn" style="background:transparent; border:1px dashed var(--secondary); color:var(--secondary);" onclick="addExercise(${r.id})">+ Add Exercise</button>
                </div>
            `).join('');
            const n = db.nutrition;
            document.getElementById('cal-fill').style.width = Math.min((n.consumed.cal/n.goals.cal)*100, 100) + '%';
            document.getElementById('pro-fill').style.width = Math.min((n.consumed.pro/n.goals.pro)*100, 100) + '%';
            document.getElementById('cal-text').innerText = `${n.consumed.cal} / ${n.goals.cal}`;
            document.getElementById('pro-text').innerText = `${n.consumed.pro}g / ${n.goals.pro}g`;
        }

        document.getElementById('food-input').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            const res = foodDB.filter(f => f.name.toLowerCase().includes(q));
            document.getElementById('food-results').innerHTML = q ? res.map(f => `<div style="padding:10px; border-bottom:1px solid #333; display:flex; justify-content:space-between;" onclick="const r=parseFloat(prompt('How many?','1')); db.nutrition.consumed.cal+=Math.round(${f.cal}*r); db.nutrition.consumed.pro+=Math.round(${f.pro}*r); save();"><span>${f.name}</span> <span style="color:var(--secondary)">+</span></div>`).join('') : '';
        });

        function resetDailyNutrition() { if(confirm("Reset?")) { db.nutrition.consumed = { cal: 0, pro: 0 }; save(); } }
        updateUI();
    </script>
</body>
</html>
