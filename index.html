<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="apple-touch-icon" href="icon.png.PNG">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlexJournal PRO</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; --text: #f1f5f9; --delete: #ef4444; }
        body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 100px; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
        h2, h3 { margin: 0 0 10px 0; color: var(--accent); }
        
        /* Stats Styling */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .stat-box { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; text-align: center; }
        .stat-val { font-size: 1.4rem; font-weight: bold; display: block; }
        
        /* Input Styling */
        input, select { width: 100%; padding: 10px; margin: 5px 0 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; }
        button { cursor: pointer; border-radius: 6px; border: none; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: #0f172a; width: 100%; padding: 12px; }
        .btn-ghost { background: transparent; color: var(--accent); border: 1px solid var(--accent); padding: 5px 10px; font-size: 0.8rem; }
        
        /* History Styling */
        .history-list { margin-top: 15px; border-top: 1px solid #334155; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #334155; font-size: 0.9rem; }
        .history-meta { color: #94a3b8; font-size: 0.75rem; }
        .del-btn { color: var(--delete); background: none; font-size: 1.2rem; padding: 5px; }

        /* Workout Sections */
        .workout-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 style="margin:0; font-size: 1.5rem;">FlexJournal <span style="color:var(--accent)">PRO</span></h1>
        <button class="btn-ghost" onclick="exportData()">Backup</button>
    </header>

    <div class="card">
        <div class="workout-header" onclick="toggleSection('nutri-content')">
            <h3>Nutrition Log</h3>
            <span id="nutri-arrow">▼</span>
        </div>
        
        <div id="nutri-content">
            <div class="stats-grid">
                <div class="stat-box"><span id="today-cals" class="stat-val">0</span>Calories Today</div>
                <div class="stat-box"><span id="today-protein" class="stat-val">0</span>Protein (g)</div>
            </div>

            <input type="text" id="food-name" placeholder="Food Name">
            <div style="display:flex; gap:10px;">
                <input type="number" id="food-cals" placeholder="Cals">
                <input type="number" id="food-protein" placeholder="Prot">
            </div>
            <button class="btn-primary" onclick="addFood()">Add Food</button>

            <div class="history-list">
                <p style="font-size: 0.8rem; color: var(--accent); margin-bottom: 5px;">3-Day History</p>
                <div id="history-container"></div>
            </div>
        </div>
    </div>

    <div class="card">
        <div class="workout-header" onclick="toggleSection('workout-content')">
            <h3>Active Workout</h3>
            <span>▼</span>
        </div>
        <div id="workout-content" class="hidden">
            <p style="color: #94a3b8; font-size: 0.9rem;">Workout tracking active. Data saved to FlexJournal_PRO_DATA.</p>
            </div>
    </div>

    <script>
        const STORAGE_KEY = 'FlexJournal_PRO_DATA';
        let appData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            workouts: [],
            nutrition: [],
            settings: { goalCals: 2500, goalProt: 180 }
        };

        function save() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appData));
            renderNutrition();
        }

        function toggleSection(id) {
            const el = document.getElementById(id);
            el.classList.toggle('hidden');
        }

        // --- NUTRITION LOGIC ---

        function renderNutrition() {
            const now = new Date();
            const todayStr = now.toLocaleDateString();
            
            // Define 3-day window (72 hours)
            const threeDaysAgo = new Date();
            threeDaysAgo.setDate(now.getDate() - 3);

            // 1. Calculate Today's Totals (Auto-reset logic)
            const todayLogs = appData.nutrition.filter(log => 
                new Date(log.timestamp).toLocaleDateString() === todayStr
            );

            const totals = todayLogs.reduce((acc, curr) => ({
                cals: acc.cals + Number(curr.cals),
                prot: acc.prot + Number(curr.prot)
            }), { cals: 0, prot: 0 });

            document.getElementById('today-cals').innerText = totals.cals;
            document.getElementById('today-protein').innerText = totals.prot;

            // 2. Render 3-Day History
            const container = document.getElementById('history-container');
            container.innerHTML = '';

            const recentLogs = appData.nutrition
                .filter(log => new Date(log.timestamp) >= threeDaysAgo)
                .sort((a, b) => b.timestamp - a.timestamp);

            if (recentLogs.length === 0) {
                container.innerHTML = '<p style="color:#64748b; font-size:0.8rem; text-align:center;">No recent logs.</p>';
                return;
            }

            recentLogs.forEach(log => {
                const dateObj = new Date(log.timestamp);
                const timeLabel = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const dateLabel = dateObj.toLocaleDateString([], { weekday: 'short', month: 'numeric', day: 'numeric' });

                const item = document.createElement('div');
                item.className = 'history-item';
                item.innerHTML = `
                    <div>
                        <strong>${log.name}</strong> <span class="history-meta">| ${log.cals} cal</span><br>
                        <span class="history-meta">${dateLabel} • ${timeLabel}</span>
                    </div>
                    <button class="del-btn" onclick="deleteFood(${log.id})">&times;</button>
                `;
                container.appendChild(item);
            });
        }

        function addFood() {
            const nameInput = document.getElementById('food-name');
            const calsInput = document.getElementById('food-cals');
            const protInput = document.getElementById('food-protein');

            if (!nameInput.value || !calsInput.value) return;

            const entry = {
                id: Date.now(),
                name: nameInput.value,
                cals: Number(calsInput.value),
                prot: Number(protInput.value) || 0,
                timestamp: Date.now()
            };

            appData.nutrition.push(entry);
            
            // Clear inputs
            nameInput.value = '';
            calsInput.value = '';
            protInput.value = '';
            
            save();
        }

        function deleteFood(id) {
            appData.nutrition = appData.nutrition.filter(item => item.id !== id);
            save();
        }

        // --- BACKUP LOGIC ---
        function exportData() {
            const blob = new Blob([JSON.stringify(appData)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `FlexJournal_Backup_${new Date().toLocaleDateString()}.json`;
            a.click();
        }

        // Initialize
        renderNutrition();
    </script>
</body>
</html>
