<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FlexJournal Pro</title>
    
    <link rel="apple-touch-icon" href="icon.png.PNG">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <style>
        :root {
            --bg: #121212; --card: #1e1e1e; --text: #ffffff;
            --primary: #bb86fc; --secondary: #03dac6; --error: #cf6679;
        }
        body { font-family: -apple-system, system-ui; background: var(--bg); color: var(--text); margin: 0; padding: 15px; padding-bottom: 100px;}
        .tab-bar { display: flex; gap: 10px; margin-bottom: 20px; position: sticky; top: 0; background: var(--bg); z-index: 10; padding: 10px 0; }
        .tab { flex: 1; padding: 12px; text-align: center; background: var(--card); border-radius: 8px; cursor: pointer; font-size: 14px; border: 1px solid transparent; }
        .tab.active { border-color: var(--primary); font-weight: bold; color: var(--primary); }
        #timer-display { display:none; position:fixed; top:0; left:0; width:100%; background:var(--secondary); color:black; text-align:center; padding:12px; font-weight:bold; z-index:1000; }
        .card { background: var(--card); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .workout-header { display: flex; justify-content: space-between; align-items: center; }
        .collapsed .workout-content { display: none; }
        .exercise-row { margin-bottom: 18px; border-bottom: 1px solid #2a2a2a; padding-bottom: 12px; }
        .ex-controls { display: grid; grid-template-columns: 1fr 0.8fr 0.6fr 1.2fr; gap: 6px; align-items: center; }
        input, select { background: #333; border: 1px solid #444; color: white; padding: 8px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 13px;}
        .set-btn { background: var(--secondary); border: none; padding: 8px; border-radius: 6px; color: #000; font-weight: bold; width: 100%; height: 35px;}
        .progress-bar { background: #333; height: 10px; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.3s; }
        button.main-btn { width: 100%; padding: 14px; background: var(--primary); border: none; border-radius: 10px; font-weight: bold; margin-top: 10px; color: black; }
        .hidden { display: none; }
        #selection-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.95); z-index:2000; padding:20px; box-sizing:border-box; overflow-y:auto; display:none; }
        .list-item { padding: 12px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="timer-display">
        REST: <span id="seconds">60</span>s
        <div style="display:flex; justify-content:center; gap:10px; margin-top:5px;">
            <button onclick="timeLeft+=30" style="font-size:10px;">+30s</button>
            <button onclick="endTimer()" style="font-size:10px;">End</button>
        </div>
    </div>

    <div id="selection-overlay"></div>

    <div class="tab-bar">
        <div class="tab active" onclick="showTab('workout')">Workouts</div>
        <div class="tab" onclick="showTab('nutrition')">Nutrition</div>
        <div class="tab" onclick="showTab('data')">Settings</div>
    </div>

    <div id="workout-tab" class="content-tab">
        <div id="workout-container"></div>
        <button class="main-btn" style="background: var(--secondary);" onclick="createWorkout()">+ New Workout Category</button>
    </div>

    <div id="nutrition-tab" class="content-tab hidden">
        <div class="card">
            <h2>Today's Macros</h2>
            <div style="display:flex; justify-content:space-between"><span>Calories</span><span id="cal-text">0 / 2500</span></div>
            <div class="progress-bar"><div id="cal-fill" class="progress-fill"></div></div>
            <div style="display:flex; justify-content:space-between"><span>Protein</span><span id="pro-text">0g / 150g</span></div>
            <div class="progress-bar"><div id="pro-fill" class="progress-fill" style="background:var(--secondary)"></div></div>
            <h4 style="color:var(--primary)">Today's Log</h4>
            <div id="daily-log-list"></div>
            <button class="main-btn" onclick="addCustomFood()" style="background:#444; color:white; font-size:12px;">+ Add Custom Item</button>
        </div>
        <div class="card">
            <input type="text" id="food-input" placeholder="Search (Rice, Beef, Milk)...">
            <div id="food-results"></div>
        </div>
        <div class="card">
            <h3>Last 3 Days</h3>
            <div id="history-container"></div>
        </div>
    </div>

    <div id="data-tab" class="content-tab hidden">
        <div class="card">
            <h2>Data Management</h2>
            <button class="main-btn" onclick="exportToFile()">Export Backup (.JSON)</button>
            <label class="main-btn" style="background:#444; color:white; display:block; text-align:center; cursor:pointer; margin-top:15px;">
                Import Backup (.JSON)
                <input type="file" style="display:none;" onchange="importFromFile(this)">
            </label>
            <button class="main-btn" style="background:var(--error); margin-top: 40px; font-size:10px;" onclick="if(confirm('Wipe everything?')){localStorage.clear();location.reload();}">Hard Reset App</button>
        </div>
    </div>

    <script>
        const STORAGE_KEY = 'FlexJournal_PRO_DATA';
        let timerInterval, timeLeft = 0;

        const masterLibrary = ["Back Extension", "Bulgarian Split Squat", "Cable Lateral Raise", "Cable Oblique", "Dips", "Hanging Leg Raise", "Hip Abduction", "Hip Adduction", "Hip Thrusts", "ISO Bench Press", "ISO Lateral Incline", "ISO Lateral Row", "ISO Shoulder Press", "Kettlebell Obliques", "OL Leg Press", "OL RDL", "Rear Delt Fly", "Seated Facepull", "Wood chopper"];

        function loadDB() {
            const today = new Date().toISOString().split('T')[0];
            const defaults = {
                routines: [], library: masterLibrary, customFoods: [],
                settings: { rest: 60 },
                nutrition: { consumed: { cal: 0, pro: 0 }, goals: { cal: 2500, pro: 150 }, lastUpdate: today, dailyLog: [], history: [] }
            };
            const saved = localStorage.getItem(STORAGE_KEY);
            if(!saved) return defaults;
            
            let db = JSON.parse(saved);
            // MERGE: Fix missing properties in old JSON
            db.nutrition = {...defaults.nutrition, ...db.nutrition};
            if(!db.routines) db.routines = [];
            
            // Daily Reset Logic
            if (db.nutrition.lastUpdate !== today) {
                if(db.nutrition.consumed.cal > 0) {
                    db.nutrition.history.unshift({date: db.nutrition.lastUpdate, cal: db.nutrition.consumed.cal, pro: db.nutrition.consumed.pro});
                    db.nutrition.history = db.nutrition.history.slice(0, 3);
                }
                db.nutrition.consumed = { cal: 0, pro: 0 };
                db.nutrition.dailyLog = [];
                db.nutrition.lastUpdate = today;
            }
            return db;
        }

        let db = loadDB();

        const baseFoodDB = [{ name: "White Rice", cal: 130, pro: 2.7, unit: "100g cooked" }, { name: "Brown Rice", cal: 111, pro: 2.6, unit: "100g cooked" }, { name: "Ground Beef (80/20)", cal: 250, pro: 26, unit: "100g" }, { name: "Chicken Breast", cal: 165, pro: 31, unit: "100g" }, { name: "Oats (Dry)", cal: 150, pro: 5, unit: "40g" }];

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(db)); updateUI(); }

        function createWorkout() {
            const n = prompt("Workout Name:");
            if(n) {
                db.routines.push({ id: Date.now(), name: n, date: new Date().toISOString().split('T')[0], collapsed: false, exercises: [] });
                save(); 
            }
        }

        function toggleCollapse(id) {
            const r = db.routines.find(x => x.id === id);
            r.collapsed = !r.collapsed;
            save();
        }

        function openExerciseMenu(rId) {
            const overlay = document.getElementById('selection-overlay');
            overlay.style.display = 'block';
            let html = `<h2 style="color:var(--primary)">Select Exercise</h2>`;
            html += `<button class="main-btn" onclick="createNewEx(${rId})">+ Create New</button><br><br>`;
            db.library.sort().forEach(ex => {
                html += `<div class="list-item" onclick="addExToRoutine(${rId},'${ex}')"><span>${ex}</span><span style="color:var(--secondary)">+</span></div>`;
            });
            html += `<button class="main-btn" style="background:#444" onclick="document.getElementById('selection-overlay').style.display='none'">Cancel</button>`;
            overlay.innerHTML = html;
        }

        function addExToRoutine(rId, name) {
            db.routines.find(r => r.id === rId).exercises.push({ name, weight: "", units: "lb", reps: "", setsDone: 0, targetSets: 3 });
            document.getElementById('selection-overlay').style.display = 'none';
            save();
        }

        function createNewEx(rId) {
            const n = prompt("Exercise Name:");
            if(n) { if(!db.library.includes(n)) db.library.push(n); addExToRoutine(rId, n); }
        }

        function updateSets(rId, i) {
            const ex = db.routines.find(r => r.id === rId).exercises[i];
            ex.setsDone = (ex.setsDone + 1) > ex.targetSets ? 0 : ex.setsDone + 1;
            if(ex.setsDone > 0) startTimer(); else endTimer();
            save();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timeLeft = 60;
            document.getElementById('timer-display').style.display = 'block';
            timerInterval = setInterval(() => {
                timeLeft--;
                document.getElementById('seconds').innerText = timeLeft;
                if(timeLeft <= 0) { clearInterval(timerInterval); if(navigator.vibrate) navigator.vibrate(200); }
            }, 1000);
        }
        function endTimer() { clearInterval(timerInterval); document.getElementById('timer-display').style.display = 'none'; }

        function addFoodToLog(name, cal, pro) {
            db.nutrition.consumed.cal += cal;
            db.nutrition.consumed.pro += pro;
            db.nutrition.dailyLog.push({ id: Date.now(), name, cal, pro });
            save();
        }

        function deleteFoodEntry(id) {
            const entry = db.nutrition.dailyLog.find(e => e.id === id);
            if(entry) {
                db.nutrition.consumed.cal -= entry.cal;
                db.nutrition.consumed.pro -= entry.pro;
                db.nutrition.dailyLog = db.nutrition.dailyLog.filter(e => e.id !== id);
                save();
            }
        }

        function updateUI() {
            const cont = document.getElementById('workout-container');
            cont.innerHTML = db.routines.map(r => `
                <div class="card ${r.collapsed ? 'collapsed' : ''}">
                    <div class="workout-header" onclick="toggleCollapse(${r.id})">
                        <h2>${r.name}</h2>
                        <span>${r.collapsed ? '▶' : '▼'}</span>
                    </div>
                    <div class="workout-content">
                        ${r.exercises.map((ex, i) => `
                            <div class="exercise-row">
                                <div style="display:flex; justify-content:space-between"><strong>${ex.name}</strong> <span onclick="db.routines.find(x=>x.id==${r.id}).exercises.splice(${i},1);save()">✕</span></div>
                                <div class="ex-controls">
                                    <input type="text" placeholder="wt" value="${ex.weight}" onchange="db.routines.find(x=>x.id==${r.id}).exercises[${i}].weight=this.value;save()">
                                    <select onchange="db.routines.find(x=>x.id==${r.id}).exercises[${i}].units=this.value;save()">
                                        <option ${ex.units==='lb'?'selected':''}>lb</option><option ${ex.units==='kg'?'selected':''}>kg</option>
                                    </select>
                                    <input type="number" placeholder="reps" value="${ex.reps}" onchange="db.routines.find(x=>x.id==${r.id}).exercises[${i}].reps=this.value;save()">
                                    <button class="set-btn" onclick="updateSets(${r.id}, ${i})">${ex.setsDone}/${ex.targetSets}</button>
                                </div>
                            </div>
                        `).join('')}
                        <button class="main-btn" style="background:transparent; border:1px dashed var(--secondary); color:var(--secondary);" onclick="event.stopPropagation(); openExerciseMenu(${r.id})">+ Add Exercise</button>
                    </div>
                </div>
            `).join('');

            const n = db.nutrition;
            document.getElementById('cal-fill').style.width = (n.consumed.cal/n.goals.cal)*100 + '%';
            document.getElementById('pro-fill').style.width = (n.consumed.pro/n.goals.pro)*100 + '%';
            document.getElementById('cal-text').innerText = `${n.consumed.cal} / ${n.goals.cal}`;
            document.getElementById('pro-text').innerText = `${n.consumed.pro}g / ${n.goals.pro}g`;
            document.getElementById('daily-log-list').innerHTML = n.dailyLog.map(e => `
                <div class="list-item"><span>${e.name} (${e.cal}c)</span><span onclick="deleteFoodEntry(${e.id})" style="color:var(--error)">✕</span></div>
            `).join('') || '<p style="font-size:12px; color:#666">No food logged.</p>';
            document.getElementById('history-container').innerHTML = n.history.map(h => `<div style="font-size:12px; padding:5px 0;">${h.date}: ${h.cal} cal | ${h.pro}g</div>`).join('');
        }

        document.getElementById('food-input').addEventListener('input', (e) => {
            const q = e.target.value.toLowerCase();
            if(!q) { document.getElementById('food-results').innerHTML = ''; return; }
            const res = [...baseFoodDB, ...db.customFoods].filter(f => f.name.toLowerCase().includes(q));
            document.getElementById('food-results').innerHTML = res.map(f => `
                <div class="list-item" onclick="const r=parseFloat(prompt('Servings?','1')); if(r) addFoodToLog('${f.name}', Math.round(${f.cal}*r), Math.round(${f.pro}*r))">
                    <span>${f.name}</span><span>+</span>
                </div>`).join('');
        });

        function showTab(t) {
            document.querySelectorAll('.content-tab').forEach(el => el.classList.add('hidden'));
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            document.getElementById(t + '-tab').classList.remove('hidden');
            event.currentTarget.classList.add('active');
        }

        function exportToFile() {
            const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `FlexJournal_Data.json`;
            link.click();
        }

        function importFromFile(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const imported = JSON.parse(e.target.result);
                db = {...loadDB(), ...imported}; // Safe merge
                save();
                location.reload();
            };
            reader.readAsText(input.files[0]);
        }

        updateUI();
    </script>
</body>
</html>
